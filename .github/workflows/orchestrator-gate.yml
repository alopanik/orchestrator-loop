name: orchestrator-loop gate
on: [push, pull_request]
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: orchestrator-loop standing gate
        run: python3 hooks/ci_gate.py
