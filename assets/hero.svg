<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="orchestrator-loop — plan, build, verify, repeat. One command: go.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/><stop offset="1" stop-color="#0e1116"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/><stop offset="0.5" stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="14"/></filter>
  </defs>

  <rect x="0" y="0" width="760" height="340" rx="22" fill="url(#bg)"/>
  <rect x="1" y="1" width="758" height="338" rx="21" fill="none" stroke="#1e293b" stroke-width="2"/>
  <ellipse cx="650" cy="60" rx="170" ry="95" fill="#6366f1" opacity="0.20" filter="url(#soft)"/>
  <ellipse cx="120" cy="320" rx="160" ry="80" fill="#3b82f6" opacity="0.16" filter="url(#soft)"/>

  <!-- wordmark -->
  <text x="48" y="124" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="30" fill="#94a3b8">~/</text>
  <text x="84" y="124" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="52" font-weight="700" fill="#f8fafc">orchestrator</text>
  <text x="48" y="190" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="52" font-weight="700" fill="#f8fafc">-loop</text>

  <!-- accent underline -->
  <rect x="50" y="210" width="300" height="5" rx="2.5" fill="url(#acc)"/>

  <!-- rhythm line -->
  <text x="50" y="262" font-size="29" font-weight="600" fill="#cbd5e1">plan
    <tspan fill="#475569"> · </tspan>build<tspan fill="#475569"> · </tspan>verify<tspan fill="#475569"> · </tspan>repeat</text>

  <!-- go chip -->
  <rect x="566" y="232" width="150" height="64" rx="32" fill="url(#acc)"/>
  <text x="641" y="275" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="32" font-weight="700" fill="#fff">go</text>
  <text x="641" y="156" text-anchor="middle" font-size="19" fill="#94a3b8">one command</text>
</svg>
