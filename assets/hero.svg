<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 250" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="orchestrator-loop — set one goal; Claude plans, hands off the code, and verifies against reality. One command: go.">
  <defs>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" fill="none" stroke="#30363d" stroke-width="1" opacity="0.45"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="760" height="250" rx="14" fill="#0d1117"/>
  <rect x="0" y="0" width="760" height="250" rx="14" fill="url(#grid)"/>
  <rect x="0.75" y="0.75" width="758.5" height="248.5" rx="13.5" fill="none" stroke="#30363d" stroke-width="1.5"/>

  <!-- meta, top-right, monospace -->
  <text x="716" y="42" text-anchor="end" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13.5" fill="#6e7681">v0.5.0 · 7 skills · MIT</text>

  <!-- wordmark -->
  <text x="44" y="104" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="26" fill="#6e7681">~/</text>
  <text x="80" y="104" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="42" font-weight="700" fill="#e6edf3">orchestrator-loop</text>

  <!-- accent rule -->
  <rect x="46" y="124" width="232" height="3" fill="#58a6ff"/>

  <!-- subtitle -->
  <text x="46" y="162" font-size="19" fill="#adbac7">Set one goal. Claude plans it, writes the spec, hands the code to an</text>
  <text x="46" y="188" font-size="19" fill="#adbac7">executor, then verifies the result against reality — and only then accepts it.</text>

  <!-- command prompt -->
  <rect x="46" y="206" width="148" height="34" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="62" y="229" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="17" fill="#8b949e">$</text>
  <text x="80" y="229" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="17" font-weight="700" fill="#58a6ff">go</text>
  <rect x="108" y="216" width="10" height="17" fill="#58a6ff" opacity="0.9"/>
  <text x="210" y="229" font-size="15" fill="#6e7681">one command starts a session</text>
</svg>
