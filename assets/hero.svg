<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="orchestrator-loop — turn Claude into a disciplined engineering lead">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#0e1116"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="380" rx="22" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="378" rx="21" fill="none" stroke="#1e293b" stroke-width="2"/>
  <!-- ambient glow -->
  <ellipse cx="980" cy="70" rx="240" ry="120" fill="#6366f1" opacity="0.18" filter="url(#soft)"/>
  <ellipse cx="240" cy="330" rx="220" ry="110" fill="#3b82f6" opacity="0.14" filter="url(#soft)"/>

  <!-- wordmark -->
  <text x="64" y="118" font-size="34" fill="#94a3b8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">~/</text>
  <text x="98" y="118" font-size="52" font-weight="700" fill="#f8fafc" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">orchestrator-loop</text>

  <!-- tagline -->
  <text x="66" y="168" font-size="30" font-weight="600" fill="#e2e8f0">Turn Claude into a disciplined engineering lead.</text>
  <text x="66" y="206" font-size="21" fill="#94a3b8">Set one goal. It plans, writes the spec, hands off the code, and verifies the result —</text>
  <text x="66" y="234" font-size="21" fill="#94a3b8">skeptically, against reality. High leverage, low overhead, unusual velocity.</text>

  <!-- the loop, as connected pills -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="19" font-weight="600" text-anchor="middle">
    <g>
      <rect x="64"  y="280" width="118" height="52" rx="26" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
      <text x="123" y="313" fill="#cbd5e1">rules</text>
    </g>
    <g>
      <rect x="206" y="280" width="150" height="52" rx="26" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
      <text x="281" y="313" fill="#cbd5e1">roadmap</text>
    </g>
    <g>
      <rect x="380" y="280" width="106" height="52" rx="26" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
      <text x="433" y="313" fill="#cbd5e1">PRD</text>
    </g>
    <g>
      <rect x="510" y="280" width="158" height="52" rx="26" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
      <text x="589" y="313" fill="#cbd5e1">review</text>
    </g>
    <g>
      <rect x="692" y="280" width="158" height="52" rx="26" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
      <text x="771" y="313" fill="#cbd5e1">handoff</text>
    </g>
    <g>
      <rect x="874" y="280" width="150" height="52" rx="26" fill="url(#accent)"/>
      <text x="949" y="313" fill="#ffffff">verify ↺</text>
    </g>
  </g>
  <g fill="#475569" font-size="22" text-anchor="middle">
    <text x="194" y="312">→</text>
    <text x="368" y="312">→</text>
    <text x="498" y="312">→</text>
    <text x="680" y="312">→</text>
    <text x="862" y="312">→</text>
  </g>

  <!-- go chip, top-right -->
  <g>
    <rect x="1000" y="60" width="136" height="60" rx="30" fill="url(#accent)"/>
    <text x="1068" y="99" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">go</text>
  </g>
  <text x="1068" y="146" text-anchor="middle" font-size="16" fill="#94a3b8">one command</text>
</svg>
