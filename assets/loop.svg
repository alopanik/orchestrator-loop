<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 460" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="The go-driven loop: one goal into go, then roadmap, draft-prd, architect-review, handoff, verify — looping back to draft-prd per PRD until the goal is met; handoff pauses before deploy, migration, or real money">
  <defs>
    <linearGradient id="lbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/><stop offset="1" stop-color="#0e1116"/>
    </linearGradient>
    <linearGradient id="lacc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/><stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <marker id="g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
    <marker id="p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#a855f7"/></marker>
    <marker id="grn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#16a34a"/></marker>
    <marker id="amb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#d97706"/></marker>
  </defs>

  <rect x="0" y="0" width="1280" height="460" rx="22" fill="url(#lbg)"/>
  <rect x="1" y="1" width="1278" height="458" rx="21" fill="none" stroke="#1e293b" stroke-width="2"/>

  <!-- title -->
  <text x="640" y="40" text-anchor="middle" font-size="21" font-weight="700" fill="#e2e8f0">The loop runs to the goal — not to the next PRD</text>
  <text x="640" y="66" text-anchor="middle" font-size="14.5" fill="#94a3b8">plan + QA stay with Claude · an executor writes the code · stop only when verified, blocked, or asked</text>

  <!-- return arc: verify -> draft-prd, clean over the top -->
  <path d="M1110 180 L1110 132 Q1110 116 1094 116 L610 116 Q594 116 594 132 L594 178" fill="none" stroke="#a855f7" stroke-width="2.5" marker-end="url(#p)"/>
  <text x="852" y="108" text-anchor="middle" font-size="14.5" font-style="italic" fill="#c4b5fd">next PRD · same turn</text>

  <!-- entry: one goal -> go -> pipeline -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" text-anchor="middle">
    <rect x="44" y="176" width="140" height="66" rx="15" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <text x="114" y="206" font-size="20">🎯</text>
    <text x="114" y="230" font-size="17" font-weight="700" fill="#e2e8f0">one goal</text>

    <rect x="212" y="184" width="104" height="50" rx="25" fill="url(#lacc)"/>
    <text x="264" y="217" font-size="24" font-weight="700" fill="#fff">go</text>
  </g>
  <text x="264" y="258" text-anchor="middle" font-size="13" fill="#64748b">orient first</text>

  <!-- pipeline boxes -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="16.5" font-weight="600" text-anchor="middle">
    <rect x="348"  y="180" width="148" height="58" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <text x="422"  y="215" fill="#cbd5e1">roadmap</text>
    <rect x="520"  y="180" width="148" height="58" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <text x="594"  y="215" fill="#cbd5e1">draft-prd</text>
    <rect x="692"  y="180" width="148" height="58" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <text x="766"  y="215" fill="#cbd5e1">architect</text>
    <rect x="864"  y="180" width="148" height="58" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
    <text x="938"  y="215" fill="#cbd5e1">handoff</text>
    <rect x="1036" y="180" width="148" height="58" rx="14" fill="url(#lacc)"/>
    <text x="1110" y="215" fill="#fff">verify</text>
  </g>

  <!-- horizontal flow arrows (all at y=209, no crossings) -->
  <g fill="none" stroke="#64748b" stroke-width="2.5">
    <path d="M184 209 H210"  marker-end="url(#g)"/>
    <path d="M316 209 H346"  marker-end="url(#g)"/>
    <path d="M496 209 H518"  marker-end="url(#g)"/>
    <path d="M668 209 H690"  marker-end="url(#g)"/>
    <path d="M840 209 H862"  marker-end="url(#g)"/>
    <path d="M1012 209 H1034" marker-end="url(#g)"/>
  </g>

  <!-- exits drop straight down: verify -> goal met, handoff -> pause -->
  <path d="M1110 238 V322" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#grn)"/>
  <path d="M938 238 V322"  fill="none" stroke="#d97706" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#amb)"/>

  <g text-anchor="middle">
    <rect x="1036" y="324" width="148" height="62" rx="14" fill="#052e16" stroke="#16a34a" stroke-width="2"/>
    <text x="1110" y="352" font-size="18">✅</text>
    <text x="1110" y="374" font-size="15" font-weight="700" fill="#86efac">goal met</text>

    <rect x="864" y="324" width="148" height="62" rx="14" fill="#3b1d05" stroke="#b45309" stroke-width="2"/>
    <text x="938" y="352" font-size="18">⏸️</text>
    <text x="938" y="374" font-size="15" font-weight="700" fill="#fcd34d">pause for you</text>
  </g>
  <text x="938" y="408" text-anchor="middle" font-size="13.5" fill="#d97706">deploy · migration · real money</text>
  <text x="1110" y="408" text-anchor="middle" font-size="13.5" fill="#4ade80">met + verified</text>
</svg>
