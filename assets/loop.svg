<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 760" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="The go-driven loop, top to bottom: one goal into go, then roadmap, draft-prd, architect-review, handoff, verify — looping back to draft-prd per PRD until the goal is met and verified; handoff pauses before deploy, migration, or real money">
  <defs>
    <linearGradient id="lbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0b1020"/><stop offset="1" stop-color="#0e1116"/></linearGradient>
    <linearGradient id="lacc" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3b82f6"/><stop offset="1" stop-color="#a855f7"/></linearGradient>
    <marker id="g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
    <marker id="p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#a855f7"/></marker>
    <marker id="grn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#16a34a"/></marker>
    <marker id="amb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#d97706"/></marker>
  </defs>

  <rect x="0" y="0" width="520" height="760" rx="22" fill="url(#lbg)"/>
  <rect x="1" y="1" width="518" height="758" rx="21" fill="none" stroke="#1e293b" stroke-width="2"/>

  <!-- header -->
  <text x="40" y="48" font-size="23" font-weight="700" fill="#e2e8f0">Runs to the goal —</text>
  <text x="40" y="78" font-size="23" font-weight="700" fill="#e2e8f0">not to the next PRD.</text>

  <!-- stages stacked on center column x=250 -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" text-anchor="middle">
    <rect x="150" y="100" width="200" height="56" rx="14" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <text x="250" y="135" font-size="21" font-weight="700" fill="#e2e8f0">🎯 one goal</text>

    <rect x="186" y="182" width="128" height="50" rx="25" fill="url(#lacc)"/>
    <text x="250" y="215" font-size="25" font-weight="700" fill="#fff">go</text>

    <g font-size="20" font-weight="600">
      <rect x="150" y="258" width="200" height="56" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
      <text x="250" y="293" fill="#cbd5e1">roadmap</text>
      <rect x="150" y="336" width="200" height="56" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
      <text x="250" y="371" fill="#cbd5e1">draft-prd</text>
      <rect x="150" y="414" width="200" height="56" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
      <text x="250" y="449" fill="#cbd5e1">architect-review</text>
      <rect x="150" y="492" width="200" height="56" rx="14" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
      <text x="250" y="527" fill="#cbd5e1">handoff</text>
      <rect x="150" y="588" width="200" height="56" rx="14" fill="url(#lacc)"/>
      <text x="250" y="623" fill="#fff">verify</text>
    </g>
  </g>

  <!-- vertical flow arrows -->
  <g fill="none" stroke="#64748b" stroke-width="2.5">
    <path d="M250 156 V180" marker-end="url(#g)"/>
    <path d="M250 232 V256" marker-end="url(#g)"/>
    <path d="M250 314 V334" marker-end="url(#g)"/>
    <path d="M250 392 V412" marker-end="url(#g)"/>
    <path d="M250 470 V490" marker-end="url(#g)"/>
    <path d="M250 548 V586" marker-end="url(#g)"/>
  </g>

  <!-- return arc: verify -> draft-prd, looping out the LEFT -->
  <path d="M150 616 Q66 616 66 364 Q66 364 148 364" fill="none" stroke="#a855f7" stroke-width="2.5" marker-end="url(#p)"/>
  <text x="56" y="500" text-anchor="middle" font-size="16" font-style="italic" fill="#c4b5fd" transform="rotate(-90 56 500)">next PRD · same turn</text>

  <!-- handoff -> pause (out the right, conditional/amber) -->
  <path d="M350 520 H392" fill="none" stroke="#d97706" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#amb)"/>
  <g text-anchor="middle">
    <rect x="394" y="486" width="116" height="68" rx="13" fill="#3b1d05" stroke="#b45309" stroke-width="2"/>
    <text x="452" y="512" font-size="16" font-weight="700" fill="#fcd34d">⏸ pause</text>
    <text x="452" y="531" font-size="12" fill="#fbbf24">deploy · migration</text>
    <text x="452" y="546" font-size="12" fill="#fbbf24">· real money</text>
  </g>

  <!-- verify -> goal met (straight down, center) -->
  <path d="M250 644 V686" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#grn)"/>
  <g text-anchor="middle">
    <rect x="150" y="688" width="200" height="52" rx="14" fill="#052e16" stroke="#16a34a" stroke-width="2"/>
    <text x="250" y="721" font-size="19" font-weight="700" fill="#86efac">✅ goal met + verified</text>
  </g>

  <!-- footer caption -->
  <text x="384" y="724" font-size="13.5" fill="#94a3b8">plan + QA</text>
  <text x="384" y="741" font-size="13.5" fill="#94a3b8">stay with Claude</text>
</svg>
