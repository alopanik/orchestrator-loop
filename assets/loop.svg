<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" role="img" aria-label="The loop: one goal enters, runs through go, roadmap, draft-prd, architect-review, handoff, verify; architect-review and verify can each reject and loop back to draft-prd; on pass, exits as verified done.">
  <defs>
    <marker id="ar-flow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9 z" fill="#6e7681"/>
    </marker>
    <marker id="ar-reject" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9 z" fill="#f78166"/>
    </marker>
    <marker id="ar-done" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9 z" fill="#3fb950"/>
    </marker>
  </defs>

  <style>
    .lbl-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .lbl-sans { font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  </style>

  <!-- frame -->
  <rect x="0" y="0" width="400" height="800" rx="14" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="399" height="799" rx="13.5" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- header -->
  <text class="lbl-mono" x="32" y="46" font-size="12" letter-spacing="1.6" fill="#6e7681">THE LOOP</text>
  <text class="lbl-sans" x="32" y="80" font-size="22" font-weight="700" fill="#e6edf3">One goal in.</text>
  <text class="lbl-sans" x="32" y="108" font-size="22" font-weight="700" fill="#e6edf3">Verified result out.</text>

  <!-- one goal (entry) -->
  <rect x="100" y="148" width="200" height="56" rx="11" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text class="lbl-sans" x="200" y="183" text-anchor="middle" font-size="18" font-weight="700" fill="#79c0ff">one goal</text>

  <!-- flow arrow to go -->
  <path d="M200 204 V230" fill="none" stroke="#6e7681" stroke-width="1.75" marker-end="url(#ar-flow)"/>

  <!-- six skill nodes -->
  <g class="lbl-mono" text-anchor="middle" font-size="17" font-weight="600" fill="#e6edf3">
    <rect x="100" y="230" width="200" height="56" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="200" y="264">go</text>

    <rect x="100" y="312" width="200" height="56" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="200" y="346">roadmap</text>

    <rect x="100" y="394" width="200" height="56" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="200" y="428">draft-prd</text>

    <rect x="100" y="476" width="200" height="56" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="200" y="510">architect-review</text>

    <rect x="100" y="558" width="200" height="56" rx="11" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="200" y="592">handoff</text>

    <rect x="100" y="640" width="200" height="56" rx="11" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
    <text x="200" y="674" fill="#79c0ff" font-weight="700">verify</text>
  </g>

  <!-- forward flow arrows -->
  <g fill="none" stroke="#6e7681" stroke-width="1.75">
    <path d="M200 286 V310"  marker-end="url(#ar-flow)"/>
    <path d="M200 368 V392"  marker-end="url(#ar-flow)"/>
    <path d="M200 450 V474"  marker-end="url(#ar-flow)"/>
    <path d="M200 532 V556"  marker-end="url(#ar-flow)"/>
    <path d="M200 614 V638"  marker-end="url(#ar-flow)"/>
  </g>

  <!-- exit: verified done -->
  <path d="M200 696 V724" fill="none" stroke="#3fb950" stroke-width="1.75" marker-end="url(#ar-done)"/>
  <rect x="100" y="724" width="200" height="44" rx="11" fill="#0f2d18" stroke="#3fb950" stroke-width="2"/>
  <text class="lbl-sans" x="200" y="753" text-anchor="middle" font-size="16" font-weight="700" fill="#7ee2a8">verified done</text>

  <!-- reject curve: architect-review -> draft-prd (left rail) -->
  <path d="M100 504 C 40 504, 40 422, 100 422" fill="none" stroke="#f78166" stroke-width="2.25" marker-end="url(#ar-reject)"/>
  <text class="lbl-mono" x="30" y="466" text-anchor="middle" font-size="11" font-weight="700" fill="#f78166" letter-spacing="0.6" transform="rotate(-90 30 466)">REJECT</text>

  <!-- reject curve: verify -> draft-prd (right rail) -->
  <path d="M300 668 C 380 668, 380 422, 300 422" fill="none" stroke="#f78166" stroke-width="2.25" marker-end="url(#ar-reject)"/>
  <text class="lbl-mono" x="372" y="546" text-anchor="middle" font-size="11" font-weight="700" fill="#f78166" letter-spacing="0.6" transform="rotate(-90 372 546)">REJECT</text>

  <!-- footnote, bottom -->
  <text class="lbl-mono" x="32" y="788" font-size="11" fill="#6e7681">two reject paths. one accepting path.</text>
</svg>
