<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 740" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="The loop, top to bottom: one goal into go, then roadmap, draft-prd, architect-review, handoff, verify — looping back to draft-prd per PRD until the goal is met and verified; handoff pauses for approval only before an irreversible step like deploy, migration, or real money">
  <defs>
    <pattern id="grid2" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#21262d" stroke-width="1"/>
    </pattern>
    <marker id="a" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 1L9 5L0 9z" fill="#768390"/></marker>
    <marker id="ab" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 1L9 5L0 9z" fill="#58a6ff"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 1L9 5L0 9z" fill="#3fb950"/></marker>
    <marker id="am" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 1L9 5L0 9z" fill="#d29922"/></marker>
  </defs>

  <rect x="0" y="0" width="560" height="740" rx="14" fill="#0d1117"/>
  <rect x="0" y="0" width="560" height="740" rx="14" fill="url(#grid2)"/>
  <rect x="0.75" y="0.75" width="558.5" height="738.5" rx="13.5" fill="none" stroke="#30363d" stroke-width="1.5"/>

  <!-- header -->
  <text x="34" y="44" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#6e7681">// one goal in · verified result out · runs itself</text>
  <text x="34" y="74" font-size="21" font-weight="700" fill="#e6edf3">Runs to the goal — not the next PRD</text>

  <!-- legend, top-right -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11.5">
    <rect x="410" y="36" width="12" height="12" rx="2" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="428" y="46" fill="#768390">automated</text>
    <rect x="410" y="56" width="12" height="12" rx="2" fill="none" stroke="#d29922" stroke-width="1.5"/>
    <text x="428" y="66" fill="#768390">approval gate</text>
    <rect x="410" y="76" width="12" height="12" rx="2" fill="none" stroke="#3fb950" stroke-width="1.5"/>
    <text x="428" y="86" fill="#768390">verified done</text>
  </g>

  <!-- center column x = 250 -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" text-anchor="middle">
    <rect x="150" y="120" width="200" height="50" rx="9" fill="#161b22" stroke="#58a6ff" stroke-width="1.75"/>
    <text x="250" y="151" font-size="18" font-weight="700" fill="#e6edf3">one goal</text>

    <rect x="186" y="198" width="128" height="46" rx="9" fill="#0b3a66" stroke="#58a6ff" stroke-width="1.75"/>
    <text x="250" y="227" font-size="20" font-weight="700" fill="#58a6ff">go</text>

    <g font-size="18" font-weight="600">
      <rect x="150" y="272" width="200" height="50" rx="9" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text x="250" y="303" fill="#adbac7">roadmap</text>
      <rect x="150" y="344" width="200" height="50" rx="9" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text x="250" y="375" fill="#adbac7">draft-prd</text>
      <rect x="150" y="416" width="200" height="50" rx="9" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text x="250" y="447" fill="#adbac7">architect-review</text>
      <rect x="150" y="488" width="200" height="50" rx="9" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
      <text x="250" y="519" fill="#adbac7">handoff</text>
      <rect x="150" y="576" width="200" height="50" rx="9" fill="#161b22" stroke="#58a6ff" stroke-width="1.75"/>
      <text x="250" y="607" fill="#58a6ff">verify</text>
    </g>
  </g>

  <!-- straight vertical flow -->
  <g fill="none" stroke="#768390" stroke-width="1.75">
    <path d="M250 170 V196" marker-end="url(#a)"/>
    <path d="M250 244 V270" marker-end="url(#a)"/>
    <path d="M250 322 V342" marker-end="url(#a)"/>
    <path d="M250 394 V414" marker-end="url(#a)"/>
    <path d="M250 466 V486" marker-end="url(#a)"/>
    <path d="M250 538 V574" marker-end="url(#a)"/>
  </g>

  <!-- feedback arc: verify -> draft-prd, left rail -->
  <path d="M150 601 H92 Q80 601 80 589 L80 381 Q80 369 92 369 L148 369" fill="none" stroke="#58a6ff" stroke-width="1.75" marker-end="url(#ab)"/>
  <text x="70" y="485" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12.5" fill="#6e7681" transform="rotate(-90 70 485)">loop · next PRD, same turn</text>

  <!-- handoff -> pause (right, conditional / rare) -->
  <path d="M350 513 H388" fill="none" stroke="#d29922" stroke-width="1.75" stroke-dasharray="5 4" marker-end="url(#am)"/>
  <g text-anchor="middle">
    <rect x="390" y="484" width="148" height="60" rx="9" fill="#2b2008" stroke="#d29922" stroke-width="1.5"/>
    <text x="464" y="507" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" fill="#d29922">approve?</text>
    <text x="464" y="525" font-size="10.5" fill="#bb8009">only if irreversible:</text>
    <text x="464" y="538" font-size="10.5" fill="#bb8009">deploy · migration · $</text>
  </g>

  <!-- verify -> goal met -->
  <path d="M250 626 V674" fill="none" stroke="#3fb950" stroke-width="1.75" marker-end="url(#ag)"/>
  <g text-anchor="middle">
    <rect x="150" y="676" width="200" height="48" rx="9" fill="#0f2d18" stroke="#3fb950" stroke-width="1.75"/>
    <text x="250" y="705" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="16" font-weight="700" fill="#3fb950">goal met · verified</text>
  </g>
</svg>
