<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 600" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="Worked example: the executor reports a +47 percent lift and says ship. The verifier reproduces the number, finds a 61/39 sample-ratio mismatch and a leaked label, gates per segment, and rejects it — turning a shipped false win into a caught bug.">
  <defs>
    <pattern id="g3" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#21262d" stroke-width="1"/></pattern>
  </defs>
  <rect x="0" y="0" width="560" height="600" rx="14" fill="#0d1117"/>
  <rect x="0" y="0" width="560" height="600" rx="14" fill="url(#g3)"/>
  <rect x="0.75" y="0.75" width="558.5" height="598.5" rx="13.5" fill="none" stroke="#30363d" stroke-width="1.5"/>

  <text x="34" y="42" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" fill="#6e7681">// verify-handback · a worked trace</text>

  <!-- the claim -->
  <rect x="34" y="60" width="492" height="78" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="50" y="86" font-size="13" fill="#6e7681" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">executor →</text>
  <text x="50" y="110" font-size="16.5" fill="#e6edf3">“New model: <tspan font-weight="700" fill="#3fb950">+47% conversion lift</tspan> in a 1-week A/B.</text>
  <text x="50" y="130" font-size="16.5" fill="#e6edf3">All tests pass. <tspan font-weight="700" fill="#58a6ff">Ship to 100% today.</tspan>”</text>

  <!-- arrow down -->
  <path d="M280 138 V162" fill="none" stroke="#768390" stroke-width="1.75" marker-end="url(#dn)"/>
  <defs><marker id="dn" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 1L9 5L0 9z" fill="#768390"/></marker></defs>
  <text x="296" y="156" font-size="12.5" font-style="italic" fill="#d29922">+47% is too good — distrust, don't ship</text>

  <!-- the four checks -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
    <!-- 1 reproduce -->
    <rect x="34" y="170" width="492" height="58" rx="10" fill="#11161d" stroke="#30363d" stroke-width="1.25"/>
    <text x="52" y="194" font-size="13" fill="#58a6ff">1 · reproduce the number</text>
    <text x="52" y="216" font-size="13.5" font-family="ui-sans-serif,Segoe UI,Roboto,sans-serif" fill="#adbac7">re-run the query myself — not the executor's word</text>
    <text x="508" y="205" text-anchor="end" font-size="20" fill="#d29922">⚠</text>

    <!-- 2 SRM -->
    <rect x="34" y="236" width="492" height="58" rx="10" fill="#11161d" stroke="#30363d" stroke-width="1.25"/>
    <text x="52" y="260" font-size="13" fill="#58a6ff">2 · check the instrument</text>
    <text x="52" y="282" font-size="13.5" font-family="ui-sans-serif,Segoe UI,Roboto,sans-serif" fill="#adbac7">arms split <tspan font-weight="700" fill="#f85149">61 / 39</tspan>, not 50/50 → sample-ratio mismatch</text>
    <text x="508" y="271" text-anchor="end" font-size="20" fill="#f85149">✕</text>

    <!-- 3 leakage -->
    <rect x="34" y="302" width="492" height="58" rx="10" fill="#11161d" stroke="#30363d" stroke-width="1.25"/>
    <text x="52" y="326" font-size="13" fill="#58a6ff">3 · trace the source</text>
    <text x="52" y="348" font-size="13.5" font-family="ui-sans-serif,Segoe UI,Roboto,sans-serif" fill="#adbac7">“conversion” reads a field set <tspan font-weight="700" fill="#f85149">post-exposure</tspan> → label leak</text>
    <text x="508" y="337" text-anchor="end" font-size="20" fill="#f85149">✕</text>

    <!-- 4 per partition -->
    <rect x="34" y="368" width="492" height="58" rx="10" fill="#11161d" stroke="#30363d" stroke-width="1.25"/>
    <text x="52" y="392" font-size="13" fill="#58a6ff">4 · gate per segment (FDR)</text>
    <text x="52" y="414" font-size="13.5" font-family="ui-sans-serif,Segoe UI,Roboto,sans-serif" fill="#adbac7">lift lives in <tspan font-weight="700" fill="#f85149">one bot-heavy slice</tspan>; honest lift ≈ <tspan font-weight="700" fill="#e6edf3">0</tspan></text>
    <text x="508" y="403" text-anchor="end" font-size="20" fill="#f85149">✕</text>
  </g>

  <!-- verdict -->
  <path d="M280 426 V450" fill="none" stroke="#768390" stroke-width="1.75" marker-end="url(#dn)"/>
  <rect x="34" y="458" width="492" height="104" rx="10" fill="#1d1216" stroke="#f85149" stroke-width="1.75"/>
  <text x="52" y="486" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" fill="#f85149">✕ REJECTED — not a win, a leaked metric</text>
  <text x="52" y="510" font-size="14" font-family="ui-sans-serif,Segoe UI,Roboto,sans-serif" fill="#adbac7">Verdict: fix the assignment + the leaked label, re-run OOF per</text>
  <text x="52" y="530" font-size="14" font-family="ui-sans-serif,Segoe UI,Roboto,sans-serif" fill="#adbac7">segment. <tspan fill="#6e7681">Next action stated. Nothing shipped. No “looks great!”.</tspan></text>
  <text x="52" y="552" font-size="12.5" font-style="italic" fill="#6e7681">The executor would have shipped this. The orchestrator caught it.</text>
</svg>
